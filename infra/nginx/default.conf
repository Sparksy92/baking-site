# Example nginx-proxy vhost for clothing-ecommerce-baseline
# Drop this into your nginx-proxy/conf.d/ when deploying.
# Adjust server_name and upstream ports to match your environment.

upstream elder-api {
    server 127.0.0.1:8100;
}

upstream elder-storefront {
    server 127.0.0.1:3000;
}

server {
    listen 443 ssl http2;
    server_name store.example.com;

    # SSL managed by your nginx-proxy / certbot
    # ssl_certificate     /etc/letsencrypt/live/store.example.com/fullchain.pem;
    # ssl_certificate_key /etc/letsencrypt/live/store.example.com/privkey.pem;

    client_max_body_size 10M;

    # API
    location /api/ {
        proxy_pass http://elder-api;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Product image uploads (served by API static mount)
    location /images/uploads/ {
        proxy_pass http://elder-api;
        proxy_set_header Host $host;
        expires 30d;
        add_header Cache-Control "public, immutable";
    }

    # Storefront (Next.js SSR)
    location / {
        proxy_pass http://elder-storefront;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
    }

    # Next.js static assets (long cache)
    location /_next/static/ {
        proxy_pass http://elder-storefront;
        expires 365d;
        add_header Cache-Control "public, immutable";
    }

    # Security headers
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
}
