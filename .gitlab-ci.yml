# =============================================================================
# clothing-ecommerce-baseline CI/CD Pipeline
# =============================================================================
# Consumes shared templates from rezhub-devops-baseline.
# Repo-specific jobs (API tests, storefront tests) defined inline below.
# =============================================================================

include:
  - project: 'rezhub/rezhub-devops-baseline'
    ref: main
    file:
      - '/.gitlab-ci/templates/base.yml'
      - '/.gitlab-ci/templates/security-baseline.yml'

variables:
  APP_NAME: "clothing-ecommerce-baseline"
  APP_TYPE: "nextjs-fastapi"
  NODE_VERSION: "20"
  PIP_CACHE_DIR: "$CI_PROJECT_DIR/.cache/pip"
  npm_config_cache: "$CI_PROJECT_DIR/.cache/npm"
  # Security controls (Phase 1 — report-only)
  ENABLE_SECRET_SCAN: "true"
  ENABLE_VULNERABILITY_SCAN: "true"
  ENABLE_SAST: "false"
  DEPLOY_APP: "clothing-ecommerce-baseline"

# =============================================================================
# VALIDATE — Infrastructure change detection
# =============================================================================

validate:infra-impact:
  stage: validate
  image: alpine:3.19
  script:
    - |
      echo "Checking for infrastructure-impacting changes..."
      WARNINGS=""
      # Detect database driver changes
      if git diff --name-only $CI_MERGE_REQUEST_DIFF_BASE_SHA $CI_COMMIT_SHA 2>/dev/null | grep -q "requirements.txt"; then
        if git diff $CI_MERGE_REQUEST_DIFF_BASE_SHA $CI_COMMIT_SHA -- api/requirements.txt 2>/dev/null | grep -qE "^\+.*(asyncpg|psycopg|sqlalchemy|sqlite|mysql)"; then
          WARNINGS="${WARNINGS}\n⚠️  DATABASE DRIVER CHANGED — update ansible-infrastructure compose + env templates"
        fi
      fi
      # Detect Dockerfile changes
      if git diff --name-only $CI_MERGE_REQUEST_DIFF_BASE_SHA $CI_COMMIT_SHA 2>/dev/null | grep -q "Dockerfile"; then
        WARNINGS="${WARNINGS}\n⚠️  DOCKERFILE CHANGED — verify ansible-infrastructure build context still matches"
      fi
      # Detect new env vars in config
      if git diff --name-only $CI_MERGE_REQUEST_DIFF_BASE_SHA $CI_COMMIT_SHA 2>/dev/null | grep -q "config.py"; then
        if git diff $CI_MERGE_REQUEST_DIFF_BASE_SHA $CI_COMMIT_SHA -- api/app/config.py 2>/dev/null | grep -qE "^\+.*:\s*(str|int|bool)"; then
          WARNINGS="${WARNINGS}\n⚠️  NEW CONFIG/ENV VARS DETECTED — update ansible env templates"
        fi
      fi
      if [ -n "$WARNINGS" ]; then
        echo "============================================"
        echo "INFRASTRUCTURE IMPACT WARNINGS"
        echo "============================================"
        echo -e "$WARNINGS"
        echo ""
        echo "These changes may require updates to:"
        echo "  - ansible-infrastructure/roles/clothing-ecommerce/"
        echo "  - Compose templates, env templates, or vault"
        echo "============================================"
      else
        echo "No infrastructure-impacting changes detected."
      fi
  before_script:
    - apk add --no-cache git
  rules:
    - if: '$CI_PIPELINE_SOURCE == "merge_request_event"'
  allow_failure: true

# =============================================================================
# QUALITY — Linting & type checking
# =============================================================================

quality:typecheck:
  stage: quality
  image: node:${NODE_VERSION}-slim
  extends: .default_job
  cache:
    key: storefront-npm
    paths:
      - .cache/npm
      - storefront/node_modules
  before_script:
    - cd storefront
    - npm ci
  script:
    - npx tsc --noEmit
  rules:
    - changes:
        - storefront/**/*

# =============================================================================
# TEST — API (pytest) + Storefront (Vitest)
# =============================================================================

test:api:
  stage: test
  image: python:3.12-bookworm
  services:
    - name: postgres:16-alpine
      alias: postgres
      command: ["postgres", "-c", "fsync=off"]
  variables:
    POSTGRES_USER: ecommerce
    POSTGRES_PASSWORD: ecommerce_password
    POSTGRES_DB: ecommerce_test
    POSTGRES_HOST: postgres
    POSTGRES_PORT: 5432
  extends: .default_job
  cache:
    key: api-pip
    paths:
      - .cache/pip
      - api/.venv
  before_script:
    - cd api
    - python -m venv .venv
    - source .venv/bin/activate
    - pip install -r requirements.txt
  script:
    - source .venv/bin/activate
    - python -m pytest tests/ -v --tb=short --junitxml=../reports/api-test-results.xml
  artifacts:
    when: always
    paths:
      - reports/api-test-results.xml
    reports:
      junit: reports/api-test-results.xml
    expire_in: 30 days
  rules:
    - changes:
        - api/**/*

test:unit:
  stage: test
  image: node:${NODE_VERSION}-slim
  extends: .default_job
  cache:
    key: storefront-npm
    paths:
      - .cache/npm
      - storefront/node_modules
  before_script:
    - cd storefront
    - npm ci
  script:
    - npx vitest run --reporter=junit --outputFile=../reports/vitest-results.xml
  artifacts:
    when: always
    paths:
      - reports/vitest-results.xml
    reports:
      junit: reports/vitest-results.xml
    expire_in: 30 days
  rules:
    - changes:
        - storefront/**/*

# =============================================================================
# BUILD — Next.js build validation
# =============================================================================

build:storefront:
  stage: build
  image: node:${NODE_VERSION}-slim
  extends: .default_job
  cache:
    key: storefront-npm
    paths:
      - .cache/npm
      - storefront/node_modules
  variables:
    NEXT_PUBLIC_BRAND_NAME: "CI Build"
    NEXT_PUBLIC_SITE_URL: "http://localhost:3000"
    API_URL: "http://localhost:8100"
  before_script:
    - cd storefront
    - npm ci
  script:
    - npx next build
  rules:
    - changes:
        - storefront/**/*

# =============================================================================
# DEPLOY — Cross-project triggers to ansible-infrastructure
# =============================================================================

deploy:trigger-staging:
  stage: deploy
  variables:
    DEPLOY_APP: "clothing-ecommerce-baseline"
    DEPLOY_ENVIRONMENT: "staging"
    DEPLOY_REF: "${CI_COMMIT_SHORT_SHA}"
    DEPLOY_PROJECT_PATH: "${CI_PROJECT_PATH}"
  trigger:
    project: rezhub/ansible-infrastructure
    branch: main
    strategy: depend
  rules:
    - if: '$CI_COMMIT_BRANCH == "staging"'

deploy:trigger-production:
  stage: deploy
  variables:
    DEPLOY_APP: "clothing-ecommerce-baseline"
    DEPLOY_ENVIRONMENT: "production"
    DEPLOY_REF: "${CI_COMMIT_SHORT_SHA}"
    DEPLOY_PROJECT_PATH: "${CI_PROJECT_PATH}"
  trigger:
    project: rezhub/ansible-infrastructure
    branch: main
    strategy: depend
  rules:
    - if: '$CI_COMMIT_BRANCH == "main"'
      when: manual
