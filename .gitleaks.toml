# Gitleaks configuration — suppress false positives
[extend]
# Use default rules as base

[allowlist]
description = "Example/placeholder secrets, docs, and test fixtures"
paths = [
  '''\.env\.example''',
  '''PROGRESS\.md''',
  '''README\.md''',
  '''docs/.*''',
  '''tests/.*''',
  '''__tests__/.*''',
]
