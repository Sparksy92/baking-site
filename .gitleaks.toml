# Gitleaks configuration — suppress false positives
[extend]
# Use default rules as base

[[allowlist]]
description = "Example/placeholder secrets in .env.example and docs"
paths = [
  '''\.env\.example''',
  '''PROGRESS\.md''',
  '''README\.md''',
  '''docs/.*''',
]

[[allowlist]]
description = "Test fixtures with dummy data"
paths = [
  '''tests/.*''',
  '''__tests__/.*''',
]
